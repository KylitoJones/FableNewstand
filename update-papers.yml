name: Update paper list

on:
  schedule:
    # 14:00 UTC = 8:00 a.m. Mountain DAYLIGHT time (summer).
    # When daylight saving ends in November, change to '0 15 * * *'
    # if you want to keep it at 8:00 a.m. (otherwise it runs at 7:00).
    - cron: '0 14 * * *'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Refresh papers.json
        run: python scripts/update_papers.py

      - name: Commit and push if changed
        run: |
          git config user.name "frontpages-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/papers.json
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "Refresh paper list ($(date -u +%F))"
            git push
          fi
